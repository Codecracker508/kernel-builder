name: Kernel Builder for Realme GT Neo 3T

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Setup environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential bc bison flex \
          libssl-dev libelf-dev \
          git zip wget cpio python3

    - name: Clone Clang 20
      run: |
        git clone --depth=1 https://gitlab.com/provasishh/clang-20.git $HOME/tc

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/SM8250-Common/android_kernel_realme_sm8250 kernel

    - name: Build Kernel
      run: |
        cd kernel

        export PATH="$HOME/tc/bin:$PATH"

        export ARCH=arm64
        export O=out
        export CC=clang
        export LLVM=1
        export LLVM_IAS=1

        export KBUILD_BUILD_USER="suresh"
        export KBUILD_BUILD_HOST="github"

        rm -rf out

        echo "Building with kona-perf + oplus config"

        # base config
        make kona-perf_defconfig

        # merge oplus config (important)
        scripts/kconfig/merge_config.sh \
          -m arch/arm64/configs/kona-perf_defconfig \
          arch/arm64/configs/vendor/oplus.config

        make olddefconfig

        # build
        make -j$(nproc --all) 2> >(tee build.log >&2)

        if [ ! -f "out/arch/arm64/boot/Image" ]; then
          echo "❌ Build failed"
          cat build.log
          exit 1
        fi

    - name: Clone AnyKernel3 (spartan)
      run: |
        git clone --depth=1 https://github.com/bijoyv9/AnyKernel3 anykernel

    - name: Pack Kernel (safe method)
      run: |
        mkdir -p anykernel/kernels

        # ONLY copy Image → avoid dtb mismatch issues
        cp kernel/out/arch/arm64/boot/Image anykernel/kernels/

        cd anykernel
        zip -r9 Kernel_spartan.zip ./* -x .git .gitignore

    - name: Upload Kernel ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-spartan
        path: anykernel/*.zip
