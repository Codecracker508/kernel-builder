name: Build Spartan Kernel

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/SM8250-Common/android_kernel_realme_sm8250 kernel

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison build-essential flex git \
          libssl-dev libelf-dev lld llvm \
          python3 python-is-python3 \
          zip unzip cpio rsync curl \
          gcc g++ \
          binutils-aarch64-linux-gnu

    - name: Clone Clang 20
      run: |
        git clone --depth=1 https://gitlab.com/provasishh/clang-20.git tc

    - name: Build & Package Kernel
      run: |
        cd kernel

        echo "Cloning AnyKernel"
        git clone --depth=1 https://github.com/bijoyv9/AnyKernel3 ../anykernel

        DT=$(date +"%Y%m%d-%H%M")
        config=vendor/kona-perf_defconfig

        CROSS_COMPILE=$(pwd)/../tc/aarch64-linux-android-4.9/bin/aarch64-linux-android-
        KERNEL_ARCH=arm64
        KERNEL_OUT=$(pwd)/out

        export ARCH=${KERNEL_ARCH}
        export O=${KERNEL_OUT}
        export PATH="$(pwd)/../tc/bin:$(llvm-config --bindir):$PATH"

        TARGET_KERNEL_MAKE_ENV="CC=clang"

        echo "=== CONFIG ==="
        make O=${O} ${TARGET_KERNEL_MAKE_ENV} \
          LLVM_IAS=1 \
          ARCH=${ARCH} \
          CROSS_COMPILE=${CROSS_COMPILE} \
          vendor/kona-perf_defconfig

        make O=${O} olddefconfig

        echo "=== APPLY FIXES ==="

        # camera fix
        scripts/config --file ${O}/.config --disable CONFIG_SPECTRA_CAMERA_OPLUS || true
        scripts/config --file ${O}/.config --disable CONFIG_OPLUS_CAMERA || true

        # clk debug fix
        scripts/config --file ${O}/.config --disable CONFIG_DEBUG_CLK || true
        scripts/config --file ${O}/.config --disable CONFIG_COMMON_CLK_DEBUG || true

        make O=${O} olddefconfig

        # remove broken modules
        sed -i 's|techpack/camera-oplus|# techpack/camera-oplus|g' Makefile || true
        sed -i 's|techpack/camera-oplus|# techpack/camera-oplus|g' Kbuild || true

        sed -i 's|techpack/display|# techpack/display|g' Makefile || true
        sed -i 's|techpack/display|# techpack/display|g' Kbuild || true

        echo "=== BUILD START ==="

        make O=${O} \
          ARCH=${ARCH} \
          CROSS_COMPILE=${CROSS_COMPILE} \
          LLVM_IAS=1 \
          ${TARGET_KERNEL_MAKE_ENV} \
          -j$(nproc --all) 2>&1 | tee build.log

        if [ ! -f "out/arch/arm64/boot/Image" ]; then
          echo "Build failed"
          exit 1
        fi

        echo "=== PACK ==="

        cd ../anykernel
        rm -f *.zip
        cp ../kernel/out/arch/arm64/boot/Image .
        cp ../kernel/out/arch/arm64/boot/dtbo.img . || true
        cp ../kernel/out/arch/arm64/boot/dtb . || true

        zip -r9 Spartan-Kernel-${DT}.zip *

    - name: Show Errors
      if: failure()
      run: |
        echo "==== ERROR SUMMARY ===="
        grep -i -E "error:|fatal error:|undefined reference|No such file" kernel/build.log || true
        echo "======================"

    - name: Upload Kernel ZIP
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Spartan-Kernel
        path: anykernel/*.zip
