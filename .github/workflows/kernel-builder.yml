name: Build Spartan Kernel

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Setup environment
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            git zip wget cpio python3 llvm lld

      - name: Show branch
        run: echo "Building branch: ${GITHUB_REF_NAME}"

      - name: Clone Clang
        run: git clone --depth=1 https://gitlab.com/provasishh/clang-20.git $HOME/tc

      - name: Clone Kernel
        run: |
          git clone --depth=1 https://github.com/SM8250-Common/android_kernel_realme_sm8250 kernel

      - name: Build Kernel
        run: |
          cd kernel

          export PATH="$HOME/tc/bin:$(llvm-config --bindir):$PATH"

          export ARCH=arm64
          export O=out

          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          export LLVM=1
          export LLVM_IAS=1

          rm -rf out

          echo "=== CONFIG ==="
          make vendor/kona-perf_defconfig

          scripts/kconfig/merge_config.sh \
            -m arch/arm64/configs/vendor/kona-perf_defconfig \
            arch/arm64/configs/vendor/oplus.config

          make olddefconfig

          echo "=== APPLY FIXES ==="

          # camera fix
          scripts/config --file .config --disable CONFIG_SPECTRA_CAMERA_OPLUS || true
          scripts/config --file .config --disable CONFIG_OPLUS_CAMERA || true

          # clk debug fix
          scripts/config --file .config --disable CONFIG_DEBUG_CLK || true
          scripts/config --file .config --disable CONFIG_COMMON_CLK_DEBUG || true

          make olddefconfig

          # hard remove camera tree (final guarantee)
          sed -i 's/techpack\/camera-oplus/# techpack\/camera-oplus/g' Makefile || true
          sed -i 's/techpack\/camera-oplus/# techpack\/camera-oplus/g' Kbuild || true

          echo "=== BUILD START ==="

          make -j$(nproc --all) 2>&1 | tee build.log

      - name: Extract Errors (copy this if build fails)
        if: failure()
        run: |
          echo "========= ERROR SUMMARY ========="
          grep -i -E "error:|fatal error:|undefined reference|No such file" kernel/build.log || true
          echo "================================="

      - name: Clone AnyKernel3
        if: success()
        run: git clone --depth=1 https://github.com/bijoyv9/AnyKernel3 anykernel

      - name: Pack Kernel ZIP
        if: success()
        run: |
          mkdir -p anykernel/kernels
          cp kernel/out/arch/arm64/boot/Image anykernel/kernels/

          cd anykernel
          zip -r9 Kernel_spartan.zip ./* -x .git .gitignore

      - name: Prepare artifacts
        if: success()
        run: |
          mkdir artifacts
          cp anykernel/*.zip artifacts/
          cp kernel/out/arch/arm64/boot/Image artifacts/
          cp kernel/out/arch/arm64/boot/dtbo.img artifacts/ || true
          cp kernel/out/arch/arm64/boot/dtb artifacts/ || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ github.ref_name }}
          path: artifacts/*
