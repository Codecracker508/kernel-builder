name: Build Realme SM8250 Kernel (Non-KSU)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget zip unzip bc bison flex \
            libssl-dev libelf-dev libncurses-dev \
            build-essential python3 cpio kmod

      - name: Clone Kernel
        run: |
          git clone --depth=1 https://github.com/AxionAOSP-devices/android_kernel_realme_sm8250.git kernel

      - name: Clone Clang-20
        run: |
          git clone --depth=1 https://gitlab.com/provasishh/clang-20.git clang

      - name: Verify Clang Layout
        run: |
          echo "Checking clang structure..."
          ls clang

          if [ ! -d clang/clang/bin ]; then
            echo "clang bin directory missing!"
            exit 1
          fi

          if [ ! -f clang/clang/bin/clang ]; then
            echo "clang binary missing!"
            exit 1
          fi

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/bijoyv9/AnyKernel3 AnyKernel3

      - name: Setup Environment
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=CI" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=GitHub" >> $GITHUB_ENV

      - name: Prepare Output
        run: |
          mkdir -p kernel/out

      - name: Fix Kernel Scripts
        run: |
          cd kernel

          if [ -f scripts/as-version.sh ]; then
            sed -i 's#../scripts/min-tool-version.sh#scripts/min-tool-version.sh#g' scripts/as-version.sh
          fi

          if [ ! -f scripts/min-tool-version.sh ]; then
            printf '#!/bin/sh\nexit 0\n' > scripts/min-tool-version.sh
            chmod +x scripts/min-tool-version.sh
          fi

      - name: Build Kernel (Force Correct Clang)
        run: |
          set -o pipefail
          cd kernel

          CLANG=$PWD/../clang/clang/bin

          echo "Using clang from: $CLANG"
          $CLANG/clang --version

          make O=out ARCH=arm64 kona-perf_defconfig 2>&1 | tee build.log

          make O=out ARCH=arm64 olddefconfig 2>&1 | tee -a build.log

          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC=$CLANG/clang \
            LD=$CLANG/ld.lld \
            AR=$CLANG/llvm-ar \
            NM=$CLANG/llvm-nm \
            OBJCOPY=$CLANG/llvm-objcopy \
            OBJDUMP=$CLANG/llvm-objdump \
            STRIP=$CLANG/llvm-strip \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            2>&1 | tee -a build.log

      - name: Verify Output
        run: |
          ls -lah kernel/out/arch/arm64/boot/ || true

      - name: Copy to AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
          cp kernel/out/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true
          cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true

      - name: Create Flashable Zip
        run: |
          cd AnyKernel3
          zip -r9 ../kernel.zip * -x .git README.md

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: |
            kernel/out/arch/arm64/boot/Image*
            kernel/out/arch/arm64/boot/dtbo.img
            kernel/build.log
            kernel.zip