name: Build Realme SM8250 Kernel (Non-KSU)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git curl wget zip unzip bc bison flex \
            libssl-dev libelf-dev build-essential \
            python3 cpio kmod rsync

      - name: Clone Clang
        run: |
          git clone --depth=1 https://gitlab.com/provasishh/clang-20.git clang

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/bijoyv9/AnyKernel3 AnyKernel3

      - name: Export Env
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=CI" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=GitHub" >> $GITHUB_ENV
          echo "PATH=$PWD/clang/bin:$PATH" >> $GITHUB_ENV

      # 🔍 Detect correct kernel directory automatically
      - name: Detect Kernel Directory
        id: kdir
        run: |
          if [ -d "kernel/realme/sm8250" ]; then
            echo "KERNEL_DIR=kernel/realme/sm8250" >> $GITHUB_ENV
          else
            echo "KERNEL_DIR=." >> $GITHUB_ENV
          fi

          echo "Using kernel dir: $KERNEL_DIR"

      # 🔍 Debug (so we never guess again)
      - name: Debug Paths
        run: |
          cd $KERNEL_DIR
          pwd
          ls
          ls arch/arm64/configs/vendor/ || true

      - name: Clean Output
        run: |
          rm -rf $KERNEL_DIR/out
          mkdir -p $KERNEL_DIR/out

      - name: Build Kernel (Correct Way)
        run: |
          set -o pipefail
          cd $KERNEL_DIR

          # base defconfig (NO vendor/ prefix)
          make O=out ARCH=arm64 kona-perf_defconfig 2>&1 | tee build.log

          # merge oplus config (required for your tree)
          scripts/kconfig/merge_config.sh -m \
            out/.config \
            arch/arm64/configs/vendor/oplus.config \
            2>&1 | tee -a build.log

          # finalize config
          make O=out ARCH=arm64 olddefconfig 2>&1 | tee -a build.log

          # build
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            2>&1 | tee -a build.log

      - name: Verify Output
        run: |
          ls -lah $KERNEL_DIR/out/arch/arm64/boot/ || true

      - name: Copy to AnyKernel3
        run: |
          cp $KERNEL_DIR/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ 2>/dev/null || true
          cp $KERNEL_DIR/out/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true
          cp $KERNEL_DIR/out/arch/arm64/boot/Image AnyKernel3/ 2>/dev/null || true

      - name: Create Flashable Zip
        run: |
          cd AnyKernel3
          zip -r9 ../kernel.zip * -x .git README.md

      - name: Upload Artifacts (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image*
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtbo.img
            kernel.zip
            ${{ env.KERNEL_DIR }}/build.log

      - name: Upload Boot Image (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-image
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/boot.img